name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run marketplace integration tests
        run: python3 tests/test_marketplace.py

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run Docker tests
        run: |
          docker build -f Dockerfile.test -t claude-marketplace-test .
          docker run --rm claude-marketplace-test
